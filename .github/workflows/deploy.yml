name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  schedule:
    # Refresh data daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch NWSL data from American Soccer Analysis API
        run: |
          mkdir -p data
          BASE="https://app.americansocceranalysis.com/api/v1"
          curl -sf "$BASE/nwsl/teams"  -o data/teams.json
          curl -sf "$BASE/nwsl/stadia" -o data/stadia.json
          for SEASON in 2016 2017 2018 2019 2020 2021 2022 2023 2024 2025 2026; do
            echo "Fetching $SEASON..."
            curl -sf "$BASE/nwsl/games?season_name=$SEASON" \
              -o "data/games-$SEASON.json" \
              || echo '[]' > "data/games-$SEASON.json"
          done
          echo "Data fetched:"
          ls -lh data/

      - name: Inject build cache-buster
        run: |
          BUILD=$(git rev-parse --short HEAD)
          sed -i "s/__BUILD__/$BUILD/g" index.html
          echo "Cache buster: $BUILD"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
