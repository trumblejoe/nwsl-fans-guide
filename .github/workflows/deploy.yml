name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  schedule:
    # Refresh data daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch NWSL data from American Soccer Analysis API
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          mkdir -p data
          BASE="https://app.americansocceranalysis.com/api/v1"
          curl -sf "$BASE/nwsl/teams"  -o data/teams.json
          curl -sf "$BASE/nwsl/stadia" -o data/stadia.json
          # On the daily cron, only refresh the active seasons; historical data is committed
          if [ "$EVENT_NAME" = "schedule" ]; then
            SEASONS="2025 2026"
          else
            SEASONS="2016 2017 2018 2019 2020 2021 2022 2023 2024 2025 2026"
          fi
          for SEASON in $SEASONS; do
            echo "Fetching $SEASON..."
            curl -sf "$BASE/nwsl/games?season_name=$SEASON" \
              -o "data/games-$SEASON.json" \
              || echo '[]' > "data/games-$SEASON.json"
          done
          echo "Data fetched:"
          ls -lh data/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch NWSL standings (no browser required)
        run: node scripts/fetch-nwsl-standings.js
        continue-on-error: true

      - name: Fetch NWSL schedule (broadcaster & upcoming game data)
        run: |
          npm install playwright
          npx playwright install --with-deps chromium
          node scripts/fetch-nwsl-schedule.js
        continue-on-error: true

      - name: Remove node_modules before artifact upload
        run: rm -rf node_modules package*.json

      - name: Inject build cache-buster
        run: |
          BUILD=$(git rev-parse --short HEAD)
          sed -i "s/__BUILD__/$BUILD/g" index.html
          echo "Cache buster: $BUILD"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
